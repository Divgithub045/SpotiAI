<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SpotiAI - Authentication Success</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      background-color: #090b0e;
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      background-image: 
        radial-gradient(at 0% 0%, rgba(29, 185, 84, 0.08) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(29, 185, 84, 0.05) 0px, transparent 50%);
    }
    
    .card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 28px;
      padding: 48px 36px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      backdrop-filter: blur(30px);
      box-shadow: 
        0 30px 60px rgba(0, 0, 0, 0.6), 
        0 0 60px rgba(29, 185, 84, 0.15);
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .icon-wrapper {
      width: 80px;
      height: 80px;
      margin: 0 auto 28px;
      background: rgba(29, 185, 84, 0.1);
      border: 1.5px solid rgba(29, 185, 84, 0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 25px rgba(29, 185, 84, 0.25);
      position: relative;
    }
    
    .icon {
      font-size: 36px;
      color: #1DB954;
      animation: pulse 2s infinite;
    }
    
    h1 {
      font-size: 26px;
      font-weight: 700;
      margin: 0 0 16px 0;
      background: linear-gradient(135deg, #ffffff 0%, #c3cfdb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    
    p {
      color: #94a3b8;
      font-size: 15px;
      line-height: 1.6;
      margin: 0 0 32px 0;
      font-weight: 300;
    }
    
    .btn {
      background: linear-gradient(135deg, #1DB954 0%, #179c45 100%);
      color: #ffffff;
      border: none;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(29, 185, 84, 0.3);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(29, 185, 84, 0.5);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
    
    @keyframes pulse {
      0% {
        transform: scale(1);
        filter: drop-shadow(0 0 0 rgba(29, 185, 84, 0.4));
      }
      70% {
        transform: scale(1.08);
        filter: drop-shadow(0 0 10px rgba(29, 185, 84, 0.8));
      }
      100% {
        transform: scale(1);
        filter: drop-shadow(0 0 0 rgba(29, 185, 84, 0));
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrapper">
      <span class="icon">✦</span>
    </div>
    <h1 id="title">Connecting to SpotiAI</h1>
    <p id="message">Securing authentication tokens and finishing profile link...</p>
    <button class="btn" id="close-btn" style="display: none;">Close Window</button>
  </div>
  <script src="callback.js"></script>
</body>
</html>
